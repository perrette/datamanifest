name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Cache mkdocs-material assets
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ github.sha }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install .[docs]
      # Refresh the Julia API reference from the DataManifest.jl repo's main
      # branch (public repo, no token needed).
      - uses: actions/checkout@v4
        with:
          repository: awi-esc/DataManifest.jl
          path: _julia_repo
      - run: python docs/_sync_julia_api.py _julia_repo/docs/api.md
      # Refresh the manifest specification mirror from the datamanifest.toml
      # repo's main branch (public repo, no token needed).
      - uses: actions/checkout@v4
        with:
          repository: perrette/datamanifest.toml
          path: _spec_repo
      - run: python docs/_sync_spec.py _spec_repo/SCHEMA.md
      - run: mkdocs gh-deploy --force
